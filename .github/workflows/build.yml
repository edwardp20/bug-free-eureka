name: Build MobileGL on ARM64 (with QEMU)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/workspace \
            -w /workspace \
            arm64v8/ubuntu:24.04 \
            bash -c "
              apt-get update &&
              apt-get install -y git cmake build-essential clang libc++-dev libc++abi-dev &&
              git clone https://github.com/MobileGL-Dev/MobileGL.git &&
              cd MobileGL &&
              git submodule update --init --recursive &&
              cmake -B build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_CXX_STANDARD=23 -DCMAKE_CXX_STANDARD_REQUIRED=ON -DCMAKE_CXX_FLAGS='-stdlib=libc++' &&
              cmake --build build
            "

      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: mobilegl-arm64-build
          path: ./MobileGL/build/